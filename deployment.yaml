apiVersion: apps/v1
kind: Deployment
metadata:
  name: pizza-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: pizza

  template:
    metadata:
      labels:
        app: pizza

    spec:
      containers:
      - name: pizza-container
        image: cloud-pizza:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80