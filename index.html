<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Pizza Factory</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🍕 Cloud Pizza Factory</h1>
        <p>Powered by AWS Cloud | Docker | Kubernetes</p>
    </header>

    <section class="menu">

        <div class="card">
            <img src="https://cloud-pizza-assets-pallavi.s3.ap-south-1.amazonaws.com/Margherita+Pizza.jpg" alt="Margherita Pizza">

            <h2>Margherita Pizza</h2>

            <h3>₹199</h3>

            <button onclick="orderPizza('Margherita Pizza')">Order Now</button>
        </div>

        <div class="card">
            <img src="https://cloud-pizza-assets-pallavi.s3.ap-south-1.amazonaws.com/Veg+Pizza.jpg" alt="Veg Pizza">

            <h2>Veg Pizza</h2>

            <h3>₹249</h3>

            <button onclick="orderPizza('Veg Pizza')">Order Now</button>
        </div>

        <div class="card">
            <img src="https://cloud-pizza-assets-pallavi.s3.ap-south-1.amazonaws.com/Farmhouse+Pizza.jpg" alt="Farmhouse Pizza">

            <h2>Farmhouse Pizza</h2>

            <h3>₹299</h3>

            <button onclick="orderPizza('Farmhouse Pizza')">Order Now</button>
        </div>

        <div class="card">
            <img src="https://cloud-pizza-assets-pallavi.s3.ap-south-1.amazonaws.com/Pepperoni+Pizza.jpg" alt="Pepperoni Pizza">

            <h2>Pepperoni Pizza</h2>

            <h3>₹349</h3>

            <button onclick="orderPizza('Pepperoni Pizza')">Order Now</button>
        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
